name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'

permissions:
  contents: write
  actions: write
  checks: write
  issues: write
  pull-requests: write

jobs:
  create-release:
    name: Release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Semantic Release
      uses: cycjimmy/semantic-release-action@v6.0.0
      id: semantic
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        extra_plugins: |
          conventional-changelog-conventionalcommits@9
