name: Build & Test

on:
  workflow_call:
    inputs:
      version:
        description: 'Package Version'
        default: '0.0.1-alpha.1'
        required: false
        type: string
      run_tests:
        description: 'Run tests, coverage, and test reporting'
        default: true
        required: false
        type: boolean

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json

    - name: .NET Build
      run: |
        dotnet build \
          --configuration Release \
          -p:Version=${{ inputs.version }}

    - name: .NET Test
      if: ${{ inputs.run_tests }}
      run: |
        dotnet test \
          --configuration Release \
          --no-build \
          --hangdump \
          --hangdump-timeout 1m \
          --report-xunit-trx \
          --report-xunit-trx-filename test-results.trx \
          --coverage \
          --coverage-output-format cobertura \
          --coverage-output coverage.cobertura.xml

    - name: Coverage
      if: ${{ inputs.run_tests }}
      uses: codecov/codecov-action@v6
      with:
        files: tests/**/TestResults/coverage.cobertura.xml
        fail_ci_if_error: true

    - name: Upload test dump
      if: ${{ inputs.run_tests && failure() }}
      uses: actions/upload-artifact@v7
      with:
        name: test-diagnostics
        path: tests/**/TestResults/*.dmp

    - name: Test Report
      uses: dorny/test-reporter@v3
      if: ${{ inputs.run_tests && (!cancelled()) }}
      with:
        name: Tests
        path: tests/**/TestResults/test-results.trx
        reporter: dotnet-trx

    - name: Test Summary
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: ${{ inputs.run_tests && (!cancelled()) }}
      with:
        check_name: Tests
        comment_mode: always
        files: tests/**/TestResults/test-results.trx

    - name: .NET Pack
      run: |
        dotnet pack \
          --configuration Release \
          -p:Version=${{ inputs.version }}

    - name: Upload NuGet Packages
      uses: actions/upload-artifact@v7
      with:
        name: nuget-packages
        path: |
          src/**/*.nupkg
          src/**/*.snupkg
